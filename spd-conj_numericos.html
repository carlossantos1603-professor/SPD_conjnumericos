<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPD – Conjuntos Numéricos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #5f2c82, #7b4397);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: white;
}

h1 {
    margin: 10px 0 0;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
}

h2 {
    margin: 5px 0 20px;
    font-size: 16px;
    font-weight: 400;
    opacity: 0.9;
    text-align: center;
}

.progress-container {
    width: 100%;
    max-width: 400px;
    margin-bottom: 15px;
}

.progress-bar {
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: #ffffff;
    width: 0%;
    transition: width 0.4s ease;
}

.progress-text {
    font-size: 14px;
    margin-top: 5px;
    text-align: right;
}

.card-container {
    perspective: 1000px;
    width: 100%;
    max-width: 400px;
    height: 220px;
}

.card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    cursor: pointer;
}

.card.flip {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    color: #333;
    border-radius: 15px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    backface-visibility: hidden;
    font-size: 18px;
    font-weight: 500;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

.card-back {
    transform: rotateY(180deg);
}

.buttons {
    margin-top: 20px;
    display: none;
    width: 100%;
    max-width: 400px;
    justify-content: space-between;
}

button {
    flex: 1;
    padding: 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}

.correct {
    background: #4CAF50;
    color: white;
}

.wrong {
    background: #f44336;
    color: white;
}

.info {
    margin-bottom: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>S.P.D. – Conjuntos Numéricos</h1>
<h2>Professor Carlos Santos</h2>

<div class="progress-container">
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0%</div>
</div>

<div class="info" id="info"></div>

<div class="card-container">
    <div class="card" id="card" onclick="flipCard()">
        <div class="card-face card-front" id="front"></div>
        <div class="card-face card-back" id="back"></div>
    </div>
</div>

<div class="buttons" id="buttons">
    <button class="correct" onclick="answer(true)">Acertei</button>
    <button class="wrong" onclick="answer(false)">Errei</button>
</div>

<script>
const intervals = [1,3,7,15,30];

let cards = JSON.parse(localStorage.getItem("spd_conj")) || [
{q:"Os números naturais incluem o zero?",a:"Sim. N = {0,1,2,3,...}"},
{q:"(-3) × (-2) =",a:"6"},
{q:"√16 =",a:"4"},
{q:"Regra de sinais na multiplicação?",a:"Sinais iguais: positivo. Diferentes: negativo."},
{q:"5 ÷ 0 é possível?",a:"Não. Divisão por zero não existe."},
{q:"Dízima periódica é racional?",a:"Sim."},
{q:"(-2)² =",a:"4"},
{q:"(-2)³ =",a:"-8"},
{q:"√49 =",a:"7"},
{q:"10 - (-3) =",a:"13"}
];

let currentCard = null;
let showingAnswer = false;
let totalToday = 0;
let reviewedToday = 0;

function saveProgress(){
    localStorage.setItem("spd_conj", JSON.stringify(cards));
}

function getTodayCards(){
    let today = new Date();
    return cards.filter(card => !card.nextReview || new Date(card.nextReview) <= today);
}

function updateProgress(){
    let percent = totalToday === 0 ? 100 : Math.round((reviewedToday/totalToday)*100);
    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "% concluído";
}

function showNextCard(){
    let available = getTodayCards();
    totalToday = available.length;
    document.getElementById("info").innerText =
        totalToday > 0 ? totalToday + " cards para revisar hoje"
                       : "Parabéns! Nenhum card para revisar hoje.";

    if(totalToday === 0){
        document.getElementById("front").innerText = "Revisão concluída!";
        document.getElementById("back").innerText = "";
        document.getElementById("buttons").style.display = "none";
        updateProgress();
        return;
    }

    currentCard = available[Math.floor(Math.random()*available.length)];
    document.getElementById("front").innerText = currentCard.q;
    document.getElementById("back").innerText = currentCard.a;
    document.getElementById("card").classList.remove("flip");
    document.getElementById("buttons").style.display = "none";
    showingAnswer = false;
}

function flipCard(){
    if(!currentCard) return;
    document.getElementById("card").classList.toggle("flip");
    showingAnswer = !showingAnswer;
    if(showingAnswer){
        document.getElementById("buttons").style.display = "flex";
    }
}

function answer(correct){
    if(correct){
        currentCard.box = currentCard.box ? Math.min(currentCard.box+1,5) : 1;
    } else {
        currentCard.box = 1;
    }

    let days = intervals[(currentCard.box||1)-1];
    let next = new Date();
    next.setDate(next.getDate()+days);
    currentCard.nextReview = next;

    reviewedToday++;
    saveProgress();
    updateProgress();
    showNextCard();
}

showNextCard();
updateProgress();
</script>

</body>
</html>
